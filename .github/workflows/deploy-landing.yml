name: Deploy Landing Page

# Definindo gatilho para disparar a pipeline quando houver um push para a branch main, tanto no landing quanto no yml.
on:
  push:
    branches: [main, master]
    paths:
      - 'landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch: # Gatilho especial de fora manual, que permite disparar a esteira através de um botão.

# Variáveis de ambiente
env:
  NODE_VERSION: '20'

jobs:
  ci:
    name: CI — Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./landing

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Action que o proprio GitHub disponibiliza para fazer o checkout do código. O setup também.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4 # Faz o upload do build para o próximo job, que é o CD.
        with:
          name: landing-dist
          path: landing/dist/

  cd:
    name: CD — Deploy to Netlify
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: landing-dist
          path: landing/dist/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: |
          netlify deploy \
            --dir=landing/dist \
            --prod \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --site=${{ secrets.NETLIFY_SITE_ID }}